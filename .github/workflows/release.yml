name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.rid }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: NestVault-win-x64.zip
          - os: windows-latest
            rid: win-arm64
            artifact: NestVault-win-arm64.zip
          - os: ubuntu-latest
            rid: linux-x64
            artifact: NestVault-linux-x64.tar.gz
          - os: ubuntu-latest
            rid: linux-arm64
            artifact: NestVault-linux-arm64.tar.gz
          - os: macos-latest
            rid: osx-x64
            artifact: NestVault-macos-x64.tar.gz
          - os: macos-latest
            rid: osx-arm64
            artifact: NestVault-macos-arm64.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: >
          dotnet publish NestVault_Linux/NestVault_Linux.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:Version=${{ steps.version.outputs.VERSION }}
          -o ./publish

      - name: Sign (macOS ad-hoc)
        if: runner.os == 'macOS'
        run: codesign --deep --force --sign - ./publish/NestVault

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path ./publish/* -DestinationPath ${{ matrix.artifact }}

      - name: Package (Linux / macOS)
        if: runner.os != 'Windows'
        run: tar -czf ${{ matrix.artifact }} -C ./publish .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rid }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: false
